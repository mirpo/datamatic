name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-n-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        go-version: ["1.26"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Install dependencies
        run: make install

      - name: golangci-lint
        if: runner.os != 'Windows'
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          args: --verbose

      - name: Run tests
        run: make test

      - name: Build
        run: make build

      - name: Check datamatic version
        run: |
          ./datamatic --version

      - name: Validate all example configs (dogfood `datamatic validate`)
        shell: bash
        env:
          # only env-and-workdir templates these; other examples ignore them
          REQUIRED_FILE: prompts.csv
          DOWNLOAD_DIR: downloads
          PROVIDER: ollama
          MODEL: qwen3:1.7b
        run: |
          for f in examples/v1/*/config.yaml; do
            echo "validate: $f"
            ./datamatic validate --config "$f"
          done

      - name: Setup Ollama
        if: runner.os == 'Linux'
        uses: ai-action/setup-ollama@v1

      - name: Run datamatic with ollama
        if: runner.os == 'Linux'
        run: |
          ollama pull qwen3:1.7b
          ./datamatic --config ci/smoke.yaml --verbose
          cat ./dataset/describe.jsonl | jq
